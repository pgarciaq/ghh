<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1.5rem;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
}
header h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #e0e0e0;
}
.header-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
}
.pdf-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.9rem;
    background: #0f3460;
    color: #90caf9;
    text-decoration: none;
    border-radius: 4px;
    font-size: 0.85rem;
    transition: background 0.2s;
}
.pdf-btn:hover { background: #1a4f8a; }
.page-indicator {
    font-size: 0.85rem;
    color: #90caf9;
    min-width: 8rem;
    text-align: center;
}
#flipbook-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 0;
}
#flipbook {
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
}
.nav-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.6rem;
    background: #16213e;
    border-top: 1px solid #0f3460;
    flex-shrink: 0;
}
.nav-btn {
    padding: 0.4rem 1rem;
    background: #0f3460;
    color: #90caf9;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
}
.nav-btn:hover { background: #1a4f8a; }
.nav-btn:disabled { opacity: 0.4; cursor: default; }
footer {
    text-align: center;
    padding: 0.3rem;
    font-size: 0.7rem;
    color: #999;
    flex-shrink: 0;
}
</style>
</head>
<body>
<header>
    <div></div>
    <div class="header-controls">
        <span class="page-indicator" id="pageIndicator">Page 1 of 20</span>
        
    </div>
</header>

<div id="flipbook-container">
    <div id="flipbook"></div>
</div>

<div class="nav-controls">
    <button class="nav-btn" id="btnFirst" title="Home">&#x23EE; First</button>
    <button class="nav-btn" id="btnPrev" title="Left arrow">&#x25C0; Prev</button>
    <button class="nav-btn" id="btnNext" title="Right arrow">Next &#x25B6;</button>
    <button class="nav-btn" id="btnLast" title="End">Last &#x23ED;</button>
</div>

<footer>
    Generated by
    <a href="https://pgarciaq.github.io/ghh/"
       target="_blank"
       style="color:#90caf9">Guido's Helping Hand</a>
    &middot; StPageFlip (MIT)
</footer>

<script src="page-flip.browser.js"></script>
<script>
(function() {
    const pages = ["pages/001.jpg", "pages/002.jpg", "pages/003.jpg", "pages/004.jpg", "pages/005.jpg", "pages/006.jpg", "pages/007.jpg", "pages/008.jpg", "pages/009.jpg", "pages/010.jpg", "pages/011.jpg", "pages/012.jpg", "pages/013.jpg", "pages/014.jpg", "pages/015.jpg", "pages/016.jpg", "pages/017.jpg", "pages/018.jpg", "pages/019.jpg", "pages/020.jpg"];
    const pageCount = pages.length;
    const container = document.getElementById('flipbook');
    const indicator = document.getElementById('pageIndicator');

    const containerEl = document.getElementById('flipbook-container');
    const availW = containerEl.clientWidth - 40;
    const availH = containerEl.clientHeight - 40;

    const pageAspect = 1600 / 2358;
    let baseH = Math.min(2358, availH);
    let baseW = Math.round(baseH * pageAspect);
    if (baseW * 2 > availW) {
        baseW = Math.floor(availW / 2);
        baseH = Math.round(baseW / pageAspect);
    }

    const pageFlip = new St.PageFlip(container, {
        width: baseW,
        height: baseH,
        size: "fixed",
        minWidth: 200,
        maxWidth: baseW,
        minHeight: 300,
        maxHeight: baseH,
        showCover: false,
        maxShadowOpacity: 0.5,
        mobileScrollSupport: false,
        flippingTime: 800,
        usePortrait: true,
        startZIndex: 0,
        autoSize: true,
        drawShadow: true,
        startPage: 0,
    });

    pageFlip.loadFromImages(pages);

    function updateIndicator() {
        const current = pageFlip.getCurrentPageIndex() + 1;
        indicator.textContent = 'Page ' + current + ' of ' + pageCount;
    }
    pageFlip.on('flip', updateIndicator);
    updateIndicator();

    document.getElementById('btnFirst').addEventListener('click', function() {
        pageFlip.flip(0);
    });
    document.getElementById('btnPrev').addEventListener('click', function() {
        pageFlip.flipPrev();
    });
    document.getElementById('btnNext').addEventListener('click', function() {
        pageFlip.flipNext();
    });
    document.getElementById('btnLast').addEventListener('click', function() {
        pageFlip.flip(pageCount - 1);
    });

    document.addEventListener('keydown', function(e) {
        switch(e.key) {
            case 'ArrowLeft':
                pageFlip.flipPrev();
                e.preventDefault();
                break;
            case 'ArrowRight':
                pageFlip.flipNext();
                e.preventDefault();
                break;
            case 'Home':
                pageFlip.flip(0);
                e.preventDefault();
                break;
            case 'End':
                pageFlip.flip(pageCount - 1);
                e.preventDefault();
                break;
        }
    });
})();
</script>
</body>
</html>
