{{ define "main" }}

<nav class="site-nav">
  <div class="nav-inner">
    <a href="{{ "/" | relURL }}" class="nav-brand">Guido's Helping Hand</a>
    <ul class="nav-links">
      <li><a href="{{ "docs/" | relURL }}">Docs</a></li>
      <li><a href="{{ "/" | relURL }}#features">Features</a></li>
      <li><a href="{{ "/" | relURL }}#pipeline">Pipeline</a></li>
      <li><a href="{{ .Site.Params.githubRepo }}" target="_blank">GitHub</a></li>
    </ul>
  </div>
</nav>

<div class="docs-layout">
  <aside class="docs-sidebar">
    <h3 class="sidebar-title">Documentation</h3>
    <ul class="sidebar-nav">
      {{ range (where .Site.RegularPages "Section" "docs").ByWeight }}
        <li>
          <a href="{{ .RelPermalink }}"
             {{ if eq $.RelPermalink .RelPermalink }}class="active"{{ end }}>
            {{ .Title }}
          </a>
        </li>
      {{ end }}
    </ul>
    <a href="{{ "/" | relURL }}" class="sidebar-back">&larr; Back to home</a>
  </aside>

  <main class="docs-content">
    <h1 class="docs-page-title">{{ .Title }}</h1>
    {{ .Content }}
  </main>
</div>

{{ end }}
